# Codex Config — XHS ReCreator

[project]
name = "xhs-recreator"
description = "AI-powered Xiaohongshu content recreation tool"

[context]
# Primary docs for Codex to read
docs = [
  "AGENTS.md",
  "ARCHITECTURE.md",
  "PROGRESS.md",
  "docs/data-contract.md",
  "docs/mvp.md",
  "docs/exec-plan.md",
]

[rules]
# Don't modify these paths
readonly = [
  "spider_xhs/",
  ".env",
]

# Always use these conventions
conventions = [
  "backend: FastAPI + SQLAlchemy + loguru",
  "frontend: Vue 3 <script setup lang=\"ts\">",
  "no vue-router — currentStep state machine",
  "scoped CSS + Tailwind utilities",
]
